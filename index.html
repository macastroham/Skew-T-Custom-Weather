<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jump Profile - Weather PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-surface: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent: #2196f3;
            --hazard-crit: #d32f2f;
            --hazard-warn: #f57c00;
            --cloud-layer: #37474f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.4;
            padding-bottom: 20px;
        }

        /* High-Visibility Multi-Hazard Alert Banner */
        #alert-banner {
            display: none;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            border-bottom: 2px solid rgba(211, 47, 47, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        header {
            background-color: var(--bg-surface);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #2d2d2d;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* Location Selector Bar */
        .selector-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .loc-btn {
            flex: 1;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: var(--text-secondary);
            padding: 10px 6px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .loc-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        main {
            max-width: 600px;
            margin: 16px auto;
            padding: 0 12px;
        }

        .station-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 16px;
        }

        /* Vertical Profile Table Layout */
        .profile-container {
            background-color: var(--bg-surface);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d2d2d;
        }

        .profile-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .profile-table th {
            background-color: #252525;
            padding: 12px 8px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            border-bottom: 2px solid #333;
        }

        .profile-table td {
            padding: 10px 8px;
            font-size: 0.9rem;
            border-bottom: 1px solid #2d2d2d;
            font-variant-numeric: tabular-nums;
        }

        .alt-col {
            font-weight: 700;
            border-right: 1px solid #2d2d2d;
        }

        .pattern-row {
            background-color: rgba(33, 150, 243, 0.03);
        }

        .cloud-row {
            background-color: rgba(55, 71, 79, 0.4) !important;
        }

        .gradient-alert {
            color: #ffb74d;
            font-weight: bold;
        }

        .shift-alert {
            color: #f15c5c;
            font-weight: bold;
        }

        .unit {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-left: 2px;
        }

        .meta-note {
            margin-top: 16px;
            padding: 12px;
            background-color: #1a1a1a;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <!-- Target for active NWS Watches/Warnings -->
    <div id="alert-banner"></div>

    <header>
        <h1>JUMP PROFILE</h1>
        <div class="selector-container">
            <button class="loc-btn active" onclick="switchLocation('GA')">CENTRAL GA</button>
            <button class="loc-btn" onclick="switchLocation('TX')">VENUS, TX</button>
            <button class="loc-btn" onclick="switchLocation('CO')">ARVADA, CO</button>
        </div>
    </header>

    <main>
        <div class="station-info" id="station-meta">Loading environment baseline...</div>

        <div class="profile-container">
            <table class="profile-table">
                <thead>
                    <tr>
                        <th style="width: 25%;">Alt (AGL)</th>
                        <th style="width: 25%;">Wind (True)</th>
                        <th style="width: 25%;">Temp</th>
                        <th style="width: 25%;">Shear / Cloud</th>
                    </tr>
                </thead>
                <tbody id="profile-data-rows">
                    <!-- Dynamic rendering target -->
                </tbody>
            </table>
        </div>

        <div class="meta-note">
            <strong>Engine Metrics:</strong> Pattern altitudes mapped at 500' increments. Shear alerts trigger on directional delta &gt;30° or layer speed gradients &gt;8 kts. Cloud indicators map saturated bands where dewpoint depression is &le;2°C.
        </div>
    </main>

    <script>
        // Airfield Infrastructure Presets
        const locations = {
            GA: { name: "Central Georgia Field", elevation: 350, zone: "GAZ073", station: "MCN" },
            TX: { name: "Venus Drop Zone", elevation: 620, zone: "TXZ119", station: "FWS" },
            CO: { name: "Arvada Base", elevation: 5340, zone: "COZ039", station: "DEN" }
        };

        let currentLocKey = 'GA';

        // Expanded Safety Filtering System for Skydiving Operations
        function processNwsAlerts(alertFeatures) {
            const alertBanner = document.getElementById('alert-banner');
            if (!alertFeatures || alertFeatures.length === 0) {
                alertBanner.style.display = 'none';
                return;
            }

            // High-priority flight safety and structural convective hazards
            const aviationHazards = [
                "Tropical Storm Warning",
                "Tropical Storm Watch",
                "Hurricane Warning",
                "Hurricane Watch",
                "High Wind Warning",
                "Wind Advisory",
                "Severe Thunderstorm Warning",
                "Tornado Watch",
                "Tornado Warning",
                "Heat Advisory"
            ];

            // Filter checking explicit named matches OR broad system severity thresholds
            const activeThreats = alertFeatures.filter(feature => {
                const eventName = feature.properties?.event || "";
                const severity = feature.properties?.severity || ""; 
                return aviationHazards.includes(eventName) || ["Extreme", "Severe"].includes(severity);
            });

            if (activeThreats.length > 0) {
                const topAlert = activeThreats[0].properties;
                alertBanner.textContent = `${topAlert.event.toUpperCase()}: ${topAlert.headline || "Active Tactical Advisory"}`;
                alertBanner.style.display = 'block';

                // Elevate background colors immediately for critical threats vs standard advisories
                if (["Extreme", "Severe"].includes(topAlert.severity) || topAlert.event.includes("Warning")) {
                    alertBanner.style.backgroundColor = 'var(--hazard-crit)';
                    alertBanner.style.color = '#ffffff';
                } else {
                    alertBanner.style.backgroundColor = 'var(--hazard-warn)';
                    alertBanner.style.color = '#ffffff';
                }
            } else {
                alertBanner.style.display = 'none';
            }
        }

        // Mock processor representing backend data binding engine
        function generateMockProfileData(locKey) {
            const loc = locations[locKey];
            const targetRows = document.getElementById('profile-data-rows');
            targetRows.innerHTML = '';

            // Generate an upper-air array mixed down to ground profile definitions
            // Formatted to track both pattern slices (0-3k AGL) and transit layers
            const levels = [
                { agl: 12000, windDir: 290, windSpd: 28, temp: 24, dpDep: 5 },
                { agl: 9000,  windDir: 285, windSpd: 22, temp: 35, dpDep: 4 },
                { agl: 6000,  windDir: 260, windSpd: 18, temp: 47, dpDep: 1 }, // Cloud Layer Target
                { agl: 4500,  windDir: 245, windSpd: 14, temp: 54, dpDep: 3 },
                { agl: 3000,  windDir: 230, windSpd: 16, temp: 62, dpDep: 6 }, // Top of Pattern
                { agl: 2500,  windDir: 225, windSpd: 15, temp: 65, dpDep: 8 },
                { agl: 2000,  windDir: 220, windSpd: 14, temp: 68, dpDep: 7 },
                { agl: 1500,  windDir: 215, windSpd: 13, temp: 72, dpDep: 8 },
                { agl: 1000,  windDir: 210, windSpd: 12, temp: 75, dpDep: 9 },
                { agl: 500,   windDir: 160, windSpd: 4,  temp: 79, dpDep: 10 }, // Wind Shift Zone
                { agl: 0,     windDir: 150, windSpd: 3,  temp: 82, dpDep: 11 }
            ];

            document.getElementById('station-meta').textContent = 
                `${loc.name} — MSL Elevation: ${loc.elevation}' | Active Zone: ${loc.zone}`;

            for (let i = 0; i < levels.length; i++) {
                const lvl = levels[i];
                const msl = lvl.agl + loc.elevation;
                const isPattern = lvl.agl <= 3000;
                const isCloud = lvl.dpDep <= 2;

                let shearAlertText = '';
                let rowClass = isPattern ? 'pattern-row' : '';
                if (isCloud) rowClass += ' cloud-row';

                // Evaluate directional changes and compression tiers between layers
                if (i < levels.length - 1) {
                    const nextLvl = levels[i+1];
                    const dirDelta = Math.abs(lvl.windDir - nextLvl.windDir);
                    const spdDelta = Math.abs(lvl.windSpd - nextLvl.windSpd);

                    if (dirDelta > 30) {
                        shearAlertText = `<span class="shift-alert">Shift ➜ ${dirDelta}°</span>`;
                    } else if (spdDelta > 8) {
                        shearAlertText = `<span class="gradient-alert">Shear ➜ ${spdDelta}k</span>`;
                    }
                }

                if (isCloud && !shearAlertText) {
                    shearAlertText = '<strong>☁ Saturated Band</strong>';
                }

                const row = document.createElement('tr');
                row.className = rowClass;
                row.innerHTML = `
                    <td class="alt-col">${lvl.agl.toLocaleString()}'<br><span class="unit">${msl.toLocaleString()}' MSL</span></td>
                    <td><strong>${lvl.windDir}°</strong> @ ${lvl.windSpd}<span class="unit">kts</span></td>
                    <td>${lvl.temp}°<span class="unit">F</span></td>
                    <td>${shearAlertText || '—'}</td>
                `;
                targetRows.appendChild(row);
            }
        }

        // Live Network Pipeline Fetch Engine
        async function fetchWeatherData() {
            const loc = locations[currentLocKey];
            
            try {
                // Fetch active public safety hazards based on regional zone targets
                const alertResponse = await fetch(`https://api.weather.gov/alerts/active?zone=${loc.zone}`);
                if (alertResponse.ok) {
                    const alertData = await alertResponse.json();
                    processNwsAlerts(alertData.features || []);
                }
            } catch (err) {
                console.warn("Network interception failed or offline. Reverting to defensive state:", err);
            }

            // Render updated model data bounds onto screen interface
            generateMockProfileData(currentLocKey);
        }

        function switchLocation(locKey) {
            currentLocKey = locKey;
            document.querySelectorAll('.loc-btn').forEach(btn => btn.classList.remove('active'));
            
            // Toggle active tracking visual state
            const eventBtn = event.target;
            eventBtn.classList.add('active');
            
            fetchWeatherData();
        }

        // Initialize display stack on frame verification
        window.addEventListener('DOMContentLoaded', () => {
            fetchWeatherData();
        });

        // Register Service Worker infrastructure natively for local PWA runtime safety
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker linked successfully:', reg.scope))
                    .catch(err => console.error('Service Worker link error:', err));
            });
        }
    </script>
</body>
</html>
